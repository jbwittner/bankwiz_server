name: Develop CI
on:
  push:
    branches:
      - develop
env:
  REGISTRY: ghcr.io
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
jobs:
  resolve-dependencies:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Git repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
      - name: Setup action
        uses: ./.github/actions/setup-env
      - name: Install openapi dependancy
        run: mvn clean install -f openapi/pom.xml
  package_application:
    runs-on: ubuntu-22.04
    needs:
      - resolve-dependencies
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
      - name: Setup action
        uses: ./.github/actions/setup-env
      - name: Cache SonarCloud packages
        uses: actions/cache@v3
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar
      - name: Analyse
        run: mvn clean verify sonar:sonar
  build_docker_and_push:
    runs-on: ubuntu-22.04
    needs:
      - package_application
    permissions:
      packages: write
    steps:
      - name: Checkout Git repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: $GITHUB_ACTOR
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push develop
        uses: docker/build-push-action@v4
        with:
          context: .
          platforms: linux/amd64
          push: true
          secrets: |
            USER_GITHUB_LOGIN=$GITHUB_ACTOR
            USER_GITHUB_KEY=${{ secrets.GITHUB_TOKEN }}
          tags: |
            ghcr.io/jbwittner/bankwiz_server:develop-latest
            ghcr.io/jbwittner/bankwiz_server:develop-${{ github.sha }}
  push_maven:
    runs-on: ubuntu-22.04
    needs:
      - package_application
    permissions:
      packages: write
    steps:
      - name: Checkout Git repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
      - name: Setup action
        uses: ./.github/actions/setup-env
      - name: Publish application
        run: mvn -B deploy -DskipTests