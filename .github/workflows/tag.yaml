name: Tag CI
on:
  push:
    tags:
      - 'v*.*.*'
env:
  REGISTRY: ghcr.io
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
jobs:
  resolve-dependencies:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Git repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
      - name: Setup-Java
        uses: actions/setup-java@v3
        with:
          distribution: 'microsoft'
          java-version: '17'
          cache: 'maven'
      - name: Install openapi dependancy
        run: mvn clean install -f openapi/pom.xml
  package_application:
    runs-on: ubuntu-22.04
    needs:
      - resolve-dependencies
    steps:
      - name: Checkout Git repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
      - name: Setup-Java
        uses: actions/setup-java@v3
        with:
          distribution: 'microsoft'
          java-version: '17'
          cache: 'maven'
          cache-dependency-path: |
            'openapi.yaml'
            'domain/pom.xml'
            'infrastructure/pom.xml'
      - name: Install openapi dependancy
        run: mvn clean install -f openapi/pom.xml
      - name: Package application
        run: mvn -B package -DskipTests
      - name: Package application
        run: mvn -B package -DskipTests
  build_docker_and_push:
    runs-on: ubuntu-22.04
    permissions:
      packages: write
    steps:
      - name: Checkout Git repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: $GITHUB_ACTOR
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: .
          platforms: linux/amd64
          push: true
          secrets: |
            USER_GITHUB_LOGIN=$GITHUB_ACTOR
            USER_GITHUB_KEY=${{ secrets.GITHUB_TOKEN }}
          tags: |
            ghcr.io/jbwittner/bankwiz_server:latest
            ghcr.io/jbwittner/bankwiz_server:$GITHUB_REF_NAME
  push_maven:
    runs-on: ubuntu-22.04
    needs:
      - package_application
    permissions:
      packages: write
    steps:
      - name: Checkout Git repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
      - name: Setup-Java
        uses: actions/setup-java@v3
        with:
          distribution: 'microsoft'
          java-version: '17'
          cache: 'maven'
          cache-dependency-path: |
            'openapi.yaml'
            'domain/pom.xml'
            'infrastructure/pom.xml'
      - name: Publish application
        run: mvn -B deploy -DskipTests